<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link
    rel="stylesheet"
    href="{{ url_for('static', filename='style.css') }}"
>
    <title>Document</title>
</head>
<body>
    
<div class="container">

    <h1>✅ Request Successful</h1>

    <div class="status-card">

        <h3>Requested URL</h3>
        <p>{{ url }}</p>

        <br>

        <h3>Status Code</h3>
        <p>{{ status }}</p>

    </div>

    <br>

    <h2>Response Preview</h2>

    <pre>{{ content }}</pre>

    <br>

    <a href="/">← Back</a>

</div>

</body>
</html>
